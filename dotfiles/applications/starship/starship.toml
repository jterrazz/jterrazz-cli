"$schema" = 'https://starship.rs/config-schema.json'

# =============================================================================
# Starship prompt — Catppuccin Macchiato (matches Zed / Ghostty / zsh themes)
# Managed by `j`. No Nerd Font required: only widely-supported Unicode glyphs.
# Two lines: context on top, a clean ➜ to type on. Language versions and the
# last command's duration sit on the right so the left edge stays stable.
# =============================================================================

add_newline = true
palette = 'catppuccin_macchiato'

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$line_break\
$character"""

right_format = """
$nodejs\
$golang\
$rust\
$python\
$java\
$cmd_duration"""

[directory]
style = 'blue bold'
truncation_length = 3
truncate_to_repo = true
truncation_symbol = '…/'
read_only = ' ro'
read_only_style = 'red'

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'
vimcmd_symbol = '[➜](bold yellow)'

[git_branch]
symbol = ''
style = 'mauve'
format = 'on [$branch]($style) '

[git_status]
style = 'yellow'
format = '([$all_status$ahead_behind]($style) )'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?${count}'
stashed = '*${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '»${count}'
deleted = '✘${count}'

[git_state]
style = 'red'
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
min_time = 2_000
style = 'subtext0'
format = 'took [$duration]($style)'

[nodejs]
symbol = 'node '
style = 'green'
format = '[$symbol($version )]($style)'

[golang]
symbol = 'go '
style = 'teal'
format = '[$symbol($version )]($style)'

[rust]
symbol = 'rust '
style = 'peach'
format = '[$symbol($version )]($style)'

[python]
symbol = 'py '
style = 'yellow'
format = '[$symbol($version )]($style)'

[java]
symbol = 'java '
style = 'red'
format = '[$symbol($version )]($style)'

# Catppuccin Macchiato palette (same hex values as zshrc.sh / Ghostty / Zed).
[palettes.catppuccin_macchiato]
rosewater = '#f4dbd6'
flamingo = '#f0c6c6'
pink = '#f5bde6'
mauve = '#c6a0f6'
red = '#ed8796'
maroon = '#ee99a0'
peach = '#f5a97f'
yellow = '#eed49f'
green = '#a6da95'
teal = '#8bd5ca'
sky = '#91d7e3'
sapphire = '#7dc4e4'
blue = '#8aadf4'
lavender = '#b7bdf8'
text = '#cad3f5'
subtext1 = '#b8c0e0'
subtext0 = '#a5adcb'
overlay2 = '#939ab7'
overlay1 = '#8087a2'
overlay0 = '#6e738d'
surface2 = '#5b6078'
surface1 = '#494d64'
surface0 = '#363a4f'
base = '#24273a'
mantle = '#1e2030'
crust = '#181926'
